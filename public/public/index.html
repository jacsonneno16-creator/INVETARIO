<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DT Inventário</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;600;700&amp;family=Barlow:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<style>
    :root { --green: #1E6F4E; --amber: #F59E0B; --bg: #F5F7FA; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(30,111,78,.07) 0%, transparent 55%),
                  radial-gradient(ellipse 60% 50% at 80% 100%, rgba(245,158,11,.05) 0%, transparent 50%),
                  #F5F7FA;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,.1), 0 2px 8px rgba(0,0,0,.05);
      border: 1px solid #e2e8f0;
      text-align: center;
    }
    .logo-mark {
      width: 64px; height: 64px; border-radius: 16px;
      background: var(--green); display: flex; flex-direction: column;
      align-items: center; justify-content: center; margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(30,111,78,.3);
    }
    .logo-mark span { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 1rem; color: #fff; }
    .logo-bar { width: 24px; height: 3px; background: var(--amber); border-radius: 2px; margin-top: 3px; }
    h1 { font-size: 1.8rem; font-weight: 800; color: #1f2937; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: .9rem; margin-bottom: 36px; }
    .links { display: flex; flex-direction: column; gap: 14px; }
    a {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 22px; border-radius: 14px; text-decoration: none;
      font-weight: 700; font-size: .95rem; transition: all .2s cubic-bezier(.34,1.56,.64,1);
      border: 2px solid transparent;
    }
    a.analista {
      background: linear-gradient(135deg, var(--green), #155a3e);
      color: #fff;
      box-shadow: 0 4px 16px rgba(30,111,78,.3);
    }
    a.analista:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,111,78,.4); }
    a.coletor {
      background: linear-gradient(135deg, var(--amber), #d97706);
      color: #fff;
      box-shadow: 0 4px 16px rgba(245,158,11,.3);
    }
    a.coletor:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,.4); }
    .icon { font-size: 1.4rem; }
    .link-sub { font-size: .72rem; opacity: .8; font-weight: 500; margin-top: 1px; }
    .footer { margin-top: 28px; font-size: .72rem; color: #94a3b8; }
  </style>
</head>
<body>
<div class="card">
<div class="logo-mark">
<span>DT</span>
<div class="logo-bar"></div>
</div>
<h1>DT Inventário</h1>
<p class="sub">Da Terrinha Alimentos · Sistema de Inventário</p>
<div class="links">
<a class="analista" href="analista.html">
<span class="icon">📊</span>
<div>
<div>Painel do Analista</div>
<div class="link-sub">Gestão, divergências e acompanhamento</div>
</div>
</a>
<a class="coletor" href="coletor.html">
<span class="icon">📦</span>
<div>
<div>Aplicativo Coletor</div>
<div class="link-sub">Coleta de campo para operadores</div>
</div>
</a>
</div>
<p class="footer">Sistema de Inventário v2.0 · Firebase Realtime</p>
</div>
</body>
</html>
